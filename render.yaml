services:
  - type: web
    name: learnard-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build && npx prisma generate && npx prisma db push && npx prisma db seed
    startCommand: npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: learnard-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: STRIPE_SECRET_KEY
        sync: false

databases:
  - name: learnard-db
    plan: free
